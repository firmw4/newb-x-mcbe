[custom]
label = '''
Another variant to improve your Minecraft visual, dynamic lighting and immersive atmosphere. This variant uses visual inspiration and coloring from AI

These are some things you should do:
- Set brightness to 10-30
- Set render distance to 8-12 to get better fog (short render distance = more fog)
- Disable vsync for better performance
- Don't use experimental feature and/or education edtion

To find out about shader changes and updates, visit Newb Community discord server:
https://discord.gg/newb-community-844591537430069279
'''

# subpacks are arranged in left to right order
# right-most subpack is enabled by default

